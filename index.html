<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Friendship Competition</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <header>
    <h1>Masters Friendship Competition</h1>
    <p class="subtitle">Est. 2005 &middot; Augusta National</p>
    <nav>
      <a href="#leaderboard" class="nav-link active" data-view="leaderboard">Leaderboard</a>
      <a href="#draft" class="nav-link" data-view="draft">Draft</a>
      <a href="#weekend" class="nav-link" data-view="weekend">Weekend</a>
      <a href="#chart" class="nav-link" data-view="chart">Chart</a>
    </nav>
  </header>

  <main>
    <div id="view-leaderboard" class="view active"></div>
    <div id="view-draft" class="view"></div>
    <div id="view-weekend" class="view"></div>
    <div id="view-chart" class="view">
      <canvas id="standings-chart"></canvas>
    </div>
  </main>

  <footer>
    <span id="last-updated"></span>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/draft.js"></script>
  <script src="js/weekend.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
